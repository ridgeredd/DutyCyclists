
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Map of UVA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Map of UVA</h1>
        <div class="image-wrapper">
            <img src="image.jpg" alt="Map of UVA" class="opacity-image" usemap="#uvamap">
            <map name="uvamap">
                <area shape="rect" coords="0,0,1200,1200">
            </map>
            <div class="marker-container" id="coordinate-marker">
                <div class="marker"></div>
                <div class="tooltip"> content </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
